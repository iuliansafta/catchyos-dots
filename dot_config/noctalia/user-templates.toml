[config]

[templates]

# Neovim base16 colorscheme — syncs with Noctalia theme.
# Template input uses Noctalia color variables; output is the rendered Lua file
# that base16-colorscheme loads. Post-hook sends SIGUSR1 to all Neovim instances
# so they live-reload the new colors.
[templates.neovim]
input_path = "~/.config/noctalia/templates/neovim.lua"
output_path = "~/.config/nvim/lua/matugen.lua"
post_hook = "pkill -SIGUSR1 nvim || true"
