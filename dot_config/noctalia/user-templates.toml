[config]

[templates]

# Neovim base16 colorscheme — syncs with Noctalia theme.
# Template input uses Noctalia color variables; output is the rendered Lua file
# that base16-colorscheme loads. Post-hook sends SIGUSR1 to all Neovim instances
# so they live-reload the new colors.
[templates.neovim]
input_path = "~/.config/noctalia/templates/neovim.lua"
output_path = "~/.config/nvim/lua/matugen.lua"
post_hook = "pkill -SIGUSR1 nvim || true"

# Zed theme override — runs after Noctalia built-ins and writes our less-transparent
# Noctalia Zed theme. Built-in Zed template is disabled in settings.json so future
# Noctalia color changes cannot restore fully transparent editor/panel backgrounds.
[templates.zed_custom]
input_path = "~/.config/noctalia/templates/zed-noctalia-custom.json"
output_path = "~/.config/zed/themes/noctalia.json"
